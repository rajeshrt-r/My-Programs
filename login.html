<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — A.R Groups</title>
<meta name="description" content="Sign in to your A.R Groups account.">
<meta name="theme-color" content="#0A1628">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ============================================
   DESIGN TOKENS & THEME
   ============================================ */
:root[data-theme="dark"] {
  --bg-primary: #0A1628;
  --bg-secondary: #111D32;
  --bg-card: rgba(22,36,68,0.65);
  --text-primary: #F1F5F9;
  --text-secondary: #CBD5E1;
  --text-muted: #7B8FAA;
  --gold: #C9A84C;
  --gold-hover: #D4B65E;
  --gold-dim: rgba(201,168,76,0.12);
  --border: rgba(201,168,76,0.12);
  --border-strong: rgba(201,168,76,0.25);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.35);
  --input-bg: var(--bg-primary);
}
:root[data-theme="light"] {
  --bg-primary: #F8F9FB;
  --bg-secondary: #FFFFFF;
  --bg-card: rgba(255,255,255,0.75);
  --text-primary: #111827;
  --text-secondary: #374151;
  --text-muted: #6B7280;
  --gold: #B8952F;
  --gold-hover: #A6850A;
  --gold-dim: rgba(184,149,47,0.1);
  --border: rgba(17,24,39,0.08);
  --border-strong: rgba(17,24,39,0.15);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.12);
  --input-bg: var(--bg-primary);
}

/* ============================================
   RESET & BASE
   ============================================ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  transition:background-color .45s ease,color .45s ease;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

a { color:inherit; text-decoration:none; transition:color 0.2s; }
a:hover { color:var(--gold); }
button { font-family:inherit; cursor: pointer; border:none; background:none; }

/* Focus */
:focus-visible { outline:2px solid var(--gold); outline-offset:2px; border-radius:4px; }
:focus:not(:focus-visible) { outline:none; }

/* ============================================
   NAVIGATION
   ============================================ */
.nav {
  position:fixed; top:0; left:0; right:0; z-index:9999;
  height:72px; display:flex; align-items:center; justify-content:space-between;
  padding:0 5%;
  background:var(--bg-card); backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--border);
}
.nav-logo { display:flex; align-items:center; gap:12px; }
.nav-logo-mark {
  width:42px; height:42px; background:linear-gradient(135deg,var(--gold),#E8D99A);
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex; align-items:center; justify-content:center;
  font-family:'Playfair Display',serif; font-weight:700; font-size:15px; color:#0A1628;
}
.nav-logo-text { font-family:'Playfair Display',serif; font-size:20px; font-weight:600; color:var(--text-primary); letter-spacing:.02em; }
.nav-logo-text em { color:var(--gold); font-style:normal; }

.theme-toggle {
  width:40px; height:40px; border-radius:10px; border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  color:var(--text-primary); font-size:18px; transition:all .25s;
}
.theme-toggle:hover { border-color:var(--gold); color:var(--gold); }

/* ============================================
   LOGIN LAYOUT
   ============================================ */
.login-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 120px 24px 60px;
  position: relative;
}

.hero-bg {
  position:absolute; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(201,168,76,.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(27,45,79,.5) 0%, transparent 50%),
    var(--bg-primary);
}
.hero-grid-lines {
  position:absolute; inset:0; z-index:0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size:80px 80px;
  opacity:.3;
  mask-image:radial-gradient(ellipse 70% 60% at 50% 50%, black 20%, transparent 70%);
  -webkit-mask-image:radial-gradient(ellipse 70% 60% at 50% 50%, black 20%, transparent 70%);
}

.login-card {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 440px;
  background:var(--bg-card);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border:1px solid var(--border);
  border-radius:20px;
  padding: 48px 40px;
  box-shadow:var(--shadow-lg);
  animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.login-header {
  text-align: center;
  margin-bottom: 32px;
}
.login-header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  margin-bottom: 8px;
  color: var(--text-primary);
}
.login-header p {
  color: var(--text-muted);
  font-size: 14px;
}

.form-group {
  margin-bottom: 20px;
}
.form-label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.form-input {
  width: 100%;
  padding: 14px 16px;
  background: var(--input-bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text-primary);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  transition: border-color .25s, box-shadow .25s;
}
.form-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px var(--gold-dim);
  outline: none;
}

.form-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  font-size: 13px;
}
.checkbox-label {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-secondary);
  cursor: pointer;
}
.checkbox-label input[type="checkbox"] {
  accent-color: var(--gold);
  width: 16px;
  height: 16px;
}
.forgot-link {
  color: var(--gold);
  font-weight: 500;
}

.btn-gold {
  width: 100%;
  background: var(--gold);
  color: #0A1628;
  padding: 14px 28px;
  border-radius: 10px;
  font-weight: 600;
  font-size: 15px;
  transition: all .3s cubic-bezier(.4,0,.2,1);
  position: relative;
  overflow: hidden;
}
.btn-gold::after {
  content: '';
  position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
  transition: left .6s;
}
.btn-gold:hover {
  background: var(--gold-hover);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(201,168,76,0.25);
}
.btn-gold:hover::after { left: 100%; }

.login-footer {
  text-align: center;
  margin-top: 32px;
  font-size: 14px;
  color: var(--text-muted);
}
.login-footer a {
  color: var(--text-primary);
  font-weight: 500;
}
.login-footer a:hover {
  color: var(--gold);
}

@media(max-width:480px) {
  .login-card { padding: 40px 24px; }
  .login-header h1 { font-size: 28px; }
}
</style>
</head>

<body>

<!-- Navigation -->
<nav class="nav" role="navigation" aria-label="Main navigation">
  <a class="nav-logo" href="ar_groups_website.html" aria-label="A.R Groups - Home">
    <div class="nav-logo-mark" aria-hidden="true">AR</div>
    <span class="nav-logo-text">A.R <em>Groups</em></span>
  </a>

  <div class="nav-actions">
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode" title="Toggle theme">
      <span aria-hidden="true">🌙</span>
    </button>
  </div>
</nav>

<!-- Login Layout -->
<main class="login-container">
  <div class="hero-bg" aria-hidden="true"></div>
  <div class="hero-grid-lines" aria-hidden="true"></div>

  <div class="login-card">
    <div class="login-header">
      <h1>Welcome Back</h1>
      <p>Please enter your details to sign in.</p>
    </div>

    <form onsubmit="event.preventDefault(); window.location.href='ar_groups_website.html';">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" class="form-input" id="email" required placeholder="you@example.com" autocomplete="email">
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" class="form-input" id="password" required placeholder="••••••••" autocomplete="current-password">
      </div>

      <div class="form-actions">
        <label class="checkbox-label">
          <input type="checkbox" id="remember">
          Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-gold">Sign In</button>
    </form>

    <div class="login-footer">
      Don't have an account? <a href="#">Sign up</a>
    </div>
  </div>
</main>

<script>
// Theme — persist to localStorage
const themeToggle = document.getElementById('theme-toggle');
const savedTheme = localStorage.getItem('ar-theme');
if (savedTheme) {
  document.documentElement.setAttribute('data-theme', savedTheme);
  themeToggle.querySelector('span').textContent = savedTheme === 'dark' ? '🌙' : '☀️';
}
themeToggle.addEventListener('click', () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', newTheme);
  themeToggle.querySelector('span').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('ar-theme', newTheme);
});
</script>

</body>
</html>
