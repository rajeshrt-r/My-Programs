<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Digital Profile</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- 1. CONFIGURATION (CSS Variables) --- */
        :root {
            /* Palette */
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            /* Accents */
            --accent-1: #38bdf8; /* Sky Blue */
            --accent-2: #f472b6; /* Pink */
            
            /* Spacing & sizing */
            --card-width: 320px;
            --radius: 16px;
        }

        /* --- 2. GLOBAL STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            /* Subtle background pattern */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(244, 114, 182, 0.1) 0%, transparent 20%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 3rem; /* Space between cards */
            justify-content: center;
            max-width: 1200px;
        }

        /* --- 3. PRO CARD COMPONENT --- */
        .card {
            width: var(--card-width);
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            
            /* Glassmorphism Effect */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        /* Hover: Lift Card */
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* The Glow Top Bar */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent-color, white); /* Dynamic color via inline style */
            box-shadow: 0 0 20px var(--accent-color);
        }

        /* --- IMAGES --- */
        .img-wrapper {
            width: 100px;
            height: 100px;
            margin: 0 auto 1.5rem;
            position: relative;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.1);
            padding: 3px;
        }

        /* Status Dot (Online Indicator) */
        .status {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 14px;
            height: 14px;
            background: #22c55e;
            border: 2px solid var(--bg-color);
            border-radius: 50%;
        }

        /* --- TYPOGRAPHY --- */
        .name {
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .role {
            color: var(--accent-color);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1.5rem;
        }

        /* --- CONTACT GRID --- */
        .info-grid {
            display: grid;
            gap: 1rem;
            text-align: left;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .info-item {
            display: flex;
            align-items: center;
            color: var(--text-muted);
            padding: 8px;
            border-radius: 8px;
            transition: background 0.3s, color 0.3s;
            cursor: default;
        }

        .info-item:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
        }

        .info-item i {
            width: 24px;
            color: var(--accent-color);
            margin-right: 10px;
        }

        /* --- SOCIAL BUTTONS (Reveal Animation) --- */
        .socials {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: auto;
        }

        .social-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            background: rgba(255,255,255,0.05);
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .social-btn:hover {
            background: var(--accent-color);
            color: white;
            transform: scale(1.1);
        }

    </style>
</head>
<body>
